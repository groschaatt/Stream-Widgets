<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Segoe UI', sans-serif;
    padding: 18px;
    width: 320px;
  }

  .widget {
    background: rgba(26, 15, 46, 0.92);
    border: 0.5px solid rgba(107, 63, 160, 0.4);
    border-left: 3px solid #00d4d4;
    border-radius: 10px;
    padding: 14px 16px;
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  .widget::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at top left, rgba(61,31,94,0.5) 0%, transparent 70%);
    pointer-events: none;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    position: relative; z-index: 1;
  }

  .title {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #00d4d4;
    opacity: 0.8;
  }

  .heart {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00d4d4;
    animation: pulse 1.5s ease infinite;
    box-shadow: 0 0 6px rgba(0,212,212,0.6);
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.6; }
  }

  .counts {
    font-size: 12px;
    font-weight: 700;
    color: #e8d8ff;
  }

  .counts span { color: #00d4d4; }

  .bar-bg {
    width: 100%;
    height: 6px;
    background: rgba(107, 63, 160, 0.2);
    border-radius: 99px;
    overflow: visible;
    margin-bottom: 8px;
    position: relative; z-index: 1;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #6b3fa0, #00d4d4);
    border-radius: 99px;
    width: 0%;
    transition: width 1.8s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    right: -5px; top: -4px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #00d4d4;
    box-shadow: 0 0 8px rgba(0,212,212,0.7);
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative; z-index: 1;
  }

  .message {
    font-size: 10px;
    color: #9b7fc4;
  }

  .percent {
    font-size: 12px;
    font-weight: 700;
    color: #c4860a;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="title">
      <div class="heart"></div>
      Objectif Followers
    </div>
    <div class="counts"><span id="current">—</span> / <span id="goal">500</span></div>
  </div>
  <div class="bar-bg">
    <div class="bar-fill" id="bar"></div>
  </div>
  <div class="footer">
    <div class="message">Merci pour votre soutien ! 💜</div>
    <div class="percent" id="percent">—</div>
  </div>
</div>

<script>
  const CLIENT_ID    = '0nlnc8mnn6qah1ok4h00yfx99sppkh';
  const ACCESS_TOKEN = 'hykqxri9n1z92ovpsoqkeijfgkqim3';
  const GOAL         = 500;
  const BROADCASTER_LOGIN = 'groschaatt';

  async function getFollowers() {
    try {
      // Récupère d'abord l'ID du broadcaster
      const userRes = await fetch(`https://api.twitch.tv/helix/users?login=${BROADCASTER_LOGIN}`, {
        headers: {
          'Client-ID': CLIENT_ID,
          'Authorization': `Bearer ${ACCESS_TOKEN}`
        }
      });
      const userData = await userRes.json();
      const userId = userData.data[0].id;

      // Récupère le nombre de followers
      const followRes = await fetch(`https://api.twitch.tv/helix/channels/followers?broadcaster_id=${userId}`, {
        headers: {
          'Client-ID': CLIENT_ID,
          'Authorization': `Bearer ${ACCESS_TOKEN}`
        }
      });
      const followData = await followRes.json();
      const total = followData.total || 0;

      const pct = Math.min(Math.round((total / GOAL) * 100), 100);

      document.getElementById('current').textContent = total;
      document.getElementById('goal').textContent    = GOAL;
      document.getElementById('percent').textContent = pct + '%';

      setTimeout(() => {
        document.getElementById('bar').style.width = pct + '%';
      }, 400);

    } catch(e) {
      document.getElementById('current').textContent = '?';
    }
  }

  getFollowers();
  // Rafraîchit toutes les 2 minutes
  setInterval(getFollowers, 120000);
</script>
</body>
</html>
