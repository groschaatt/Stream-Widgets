<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Segoe UI', sans-serif;
    padding: 18px;
    width: 320px;
  }

  .widget {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card {
    background: rgba(26, 15, 46, 0.92);
    border: 0.5px solid rgba(107, 63, 160, 0.4);
    border-radius: 10px;
    padding: 11px 14px;
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards;
  }

  .card.follow { border-left: 3px solid #00d4d4; animation-delay: 0s; }
  .card.sub    { border-left: 3px solid #c4860a; animation-delay: 0.1s; }

  @keyframes fadeIn { to { opacity: 1; } }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  .card.follow::before { background: radial-gradient(ellipse at left, rgba(0,212,212,0.08) 0%, transparent 70%); }
  .card.sub::before    { background: radial-gradient(ellipse at left, rgba(196,134,10,0.08) 0%, transparent 70%); }

  .icon-wrap {
    width: 34px; height: 34px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
  }

  .card.follow .icon-wrap { background: rgba(0,212,212,0.12); }
  .card.sub    .icon-wrap { background: rgba(196,134,10,0.12); }

  .icon-wrap svg { width: 18px; height: 18px; }

  .info {
    flex: 1;
    position: relative; z-index: 1;
  }

  .label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 2px;
  }

  .card.follow .label { color: #00d4d4; }
  .card.sub    .label { color: #c4860a; }

  .name {
    font-size: 14px; font-weight: 700;
    color: #e8d8ff;
  }

  .card.flash {
    animation: flashIn 0.5s ease forwards;
  }

  @keyframes flashIn {
    0%   { opacity: 0; transform: translateX(-15px); }
    60%  { opacity: 1; transform: translateX(3px); }
    100% { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>
<div class="widget">

  <!-- Dernier Follow -->
  <div class="card follow" id="follow-card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#00d4d4"/>
      </svg>
    </div>
    <div class="info">
      <div class="label">Dernier Follow</div>
      <div class="name" id="follow-name">Chargement...</div>
    </div>
  </div>

  <!-- Dernier Sub -->
  <div class="card sub" id="sub-card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="#c4860a"/>
      </svg>
    </div>
    <div class="info">
      <div class="label">Dernier Sub</div>
      <div class="name" id="sub-name">Chargement...</div>
    </div>
  </div>

</div>

<script>
  const CLIENT_ID    = '0nlnc8mnn6qah1ok4h00yfx99sppkh';
  const ACCESS_TOKEN = 'hykqxri9n1z92ovpsoqkeijfgkqim3';
  const BROADCASTER_LOGIN = 'groschaatt';

  let broadcasterId = null;
  let lastFollowName = '';
  let lastSubName    = '';

  function flash(cardId, nameId, name) {
    const card = document.getElementById(cardId);
    const el   = document.getElementById(nameId);
    el.textContent = name;
    card.classList.remove('flash');
    void card.offsetWidth;
    card.classList.add('flash');
  }

  async function getBroadcasterId() {
    const res  = await fetch(`https://api.twitch.tv/helix/users?login=${BROADCASTER_LOGIN}`, {
      headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${ACCESS_TOKEN}` }
    });
    const data = await res.json();
    broadcasterId = data.data[0].id;
  }

  async function getLastFollower() {
    const res  = await fetch(`https://api.twitch.tv/helix/channels/followers?broadcaster_id=${broadcasterId}&first=1`, {
      headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${ACCESS_TOKEN}` }
    });
    const data = await res.json();
    if (data.data && data.data.length > 0) {
      const name = data.data[0].user_name;
      if (name !== lastFollowName) {
        lastFollowName = name;
        flash('follow-card', 'follow-name', name);
      }
    }
  }

  async function getLastSub() {
    const res  = await fetch(`https://api.twitch.tv/helix/subscriptions?broadcaster_id=${broadcasterId}&first=1`, {
      headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${ACCESS_TOKEN}` }
    });
    const data = await res.json();
    if (data.data && data.data.length > 0) {
      const name = data.data[0].user_name;
      if (name !== lastSubName) {
        lastSubName = name;
        flash('sub-card', 'sub-name', name);
      }
    } else {
      document.getElementById('sub-name').textContent = 'Aucun sub encore';
    }
  }

  async function refresh() {
    try {
      if (!broadcasterId) await getBroadcasterId();
      await getLastFollower();
      await getLastSub();
    } catch(e) {
      console.error(e);
    }
  }

  refresh();
  setInterval(refresh, 30000);
</script>
</body>
</html>
