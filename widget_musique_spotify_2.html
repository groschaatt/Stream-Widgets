<!DOCTYPE html>

<html lang="fr"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Segoe UI', sans-serif;
    padding: 18px;
    width: 360px;
  }

  .widget {
    background: rgba(26, 15, 46, 0.92);
    border: 0.5px solid rgba(107, 63, 160, 0.4);
    border-left: 3px solid #00d4d4;
    border-radius: 10px;
    padding: 12px 14px 12px 12px;
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeIn 0.6s ease 0.3s forwards;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  .widget::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at left, rgba(61,31,94,0.5) 0%, transparent 70%);
    pointer-events: none;
  }

  .cover {
    width: 52px; height: 52px;
    border-radius: 8px;
    background: rgba(61, 31, 94, 0.5);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative; z-index: 1;
  }

  .cover img {
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 8px;
  }

  .vinyl {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: conic-gradient(#2a1a42 0%, #3d1f5e 25%, #2a1a42 50%, #3d1f5e 75%, #2a1a42 100%);
    display: flex; align-items: center; justify-content: center;
    animation: spin 4s linear infinite;
    box-shadow: inset 0 0 0 14px #1a0f2e, inset 0 0 0 15px #00d4d4;
  }

  .vinyl::after {
    content: '';
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #00d4d4;
  }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .info {
    flex: 1; min-width: 0;
    position: relative; z-index: 1;
  }

  .badge {
    display: flex; align-items: center; gap: 5px;
    margin-bottom: 4px;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #00d4d4;
    animation: blink 1.4s ease infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .badge-text {
    font-size: 9px; font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: #00d4d4;
    opacity: 0.8;
  }

  .title {
    font-size: 14px; font-weight: 700;
    color: #e8d8ff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .artist {
    font-size: 12px;
    color: #9b7fc4;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 8px;
  }

  .bar-wrap { display: flex; align-items: center; gap: 8px; }

  .time {
    font-size: 10px; color: #6b3fa0;
    min-width: 28px;
  }

  .bar {
    flex: 1; height: 3px;
    background: rgba(107, 63, 160, 0.25);
    border-radius: 99px;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #6b3fa0, #00d4d4);
    border-radius: 99px;
    width: 0%;
    position: relative;
    transition: width 1s linear;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    right: -4px; top: -3px;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #00d4d4;
    box-shadow: 0 0 6px rgba(0,212,212,0.6);
  }

  .sp-logo {
    flex-shrink: 0;
    opacity: 0.4;
    position: relative; z-index: 1;
  }

  .paused-text {
    font-size: 11px;
    color: #6b3fa0;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="cover" id="cover"><div class="vinyl"></div></div>

  <div class="info">
    <div class="badge">
      <div class="dot" id="dot" style="animation-play-state: paused;"></div>
      <span class="badge-text" id="status">En pause</span>
    </div>
    <div class="title" id="title">Rien en lecture</div>
    <div class="artist" id="artist">—</div>
    <div class="bar-wrap">
      <span class="time" id="time-cur">0:00</span>
      <div class="bar"><div class="bar-fill" id="bar" style="width: 0%;"></div></div>
      <span class="time" id="time-dur" style="text-align:right">0:00</span>
    </div>
  </div>

  <div class="sp-logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="#00d4d4">
      <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"></path>
    </svg>
  </div>
</div>

<script>
  const CLIENT_ID     = '860a52533371404aae58d80cedf58f3e';
  const CLIENT_SECRET = '269db6fe5c2448ba8c4bc621c2924d6a';
  const REFRESH_TOKEN = 'AQC_CK7ihwK3IuOB4htmW1XiGjGZQq1_G4dkWHLEZdGGvJgRldH0bTT-3HhkSeIjKaZkMuy_5stRdawr-hqbNWDjCsQJCgPtDqog0XaUrYUlg2ZTrtVQ90mKp-sunz2_viU';

  let accessToken = null;

  function fmtTime(ms) {
    const s = Math.floor(ms / 1000);
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  async function getAccessToken() {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'Authorization': 'Basic ' + btoa(CLIENT_ID + ':' + CLIENT_SECRET)
      },
      body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: REFRESH_TOKEN })
    });
    const data = await res.json();
    accessToken = data.access_token;
  }

  async function getNowPlaying() {
    try {
      if (!accessToken) await getAccessToken();

      const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
        headers: { 'Authorization': 'Bearer ' + accessToken }
      });

      if (res.status === 401) { accessToken = null; return; }

      if (res.status === 204) { showIdle(); return; }

      const data = await res.json();
      if (!data || !data.item) { showIdle(); return; }

      const track     = data.item;
      const isPlaying = data.is_playing;
      const progress  = data.progress_ms;
      const duration  = track.duration_ms;
      const pct       = Math.round((progress / duration) * 100);
      const imgUrl    = track.album.images[0]?.url || null;

      document.getElementById('title').textContent  = track.name;
      document.getElementById('artist').textContent = track.artists.map(a => a.name).join(', ');
      document.getElementById('bar').style.width    = pct + '%';
      document.getElementById('time-cur').textContent = fmtTime(progress);
      document.getElementById('time-dur').textContent = fmtTime(duration);
      document.getElementById('status').textContent   = isPlaying ? 'En écoute' : 'En pause';
      document.getElementById('dot').style.animationPlayState = isPlaying ? 'running' : 'paused';

      const cover = document.getElementById('cover');
      if (imgUrl) {
        cover.innerHTML = `<img src="${imgUrl}" alt="pochette">`;
      } else {
        cover.innerHTML = '<div class="vinyl"></div>';
      }

    } catch(e) {
      showIdle();
    }
  }

  function showIdle() {
    document.getElementById('title').textContent    = 'Rien en lecture';
    document.getElementById('artist').textContent   = '—';
    document.getElementById('bar').style.width      = '0%';
    document.getElementById('time-cur').textContent = '0:00';
    document.getElementById('time-dur').textContent = '0:00';
    document.getElementById('status').textContent   = 'En pause';
    document.getElementById('dot').style.animationPlayState = 'paused';
    document.getElementById('cover').innerHTML = '<div class="vinyl"></div>';
  }

  getNowPlaying();
  setInterval(getNowPlaying, 10000);
</script>


</body></html>
